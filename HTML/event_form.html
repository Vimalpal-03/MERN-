<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>College Event Form</h1>
    <form action=""> 
        <fieldset>
             <fieldset>
            <legend>Event Information</legend>

            <img src="./images/trivia night.jfif" alt="event image" width="300"><br><br>

            <label for="">Event Name:</label>
            <input type="text" name="Travia Night" id="Travia Night" ><br><br>

            <label for="">Event Date:</label>
            <input type="date" name="eventDate" id="eventDate"><br><br>

            <label for="">Event Time:</label>
            <input type="time" name="eventTime" id="eventTime"><br><br>

            <label for="">Event Type:</label>
            <select name="eventType" id="eventType">
                <option value="">Select Event Type</option>
                <option value="music workshop">Music Workshop</option>
                <option value="dance">Dance</option>
                <option value="techconference">Tech Conference</option>
                <option value="quiz game">Quiz Games</option>
            </select><br><br>

            <label for="">Location:</label>
            <input type="text" name="location" id="location" placeholder="enter event location"><br><br>

            <label for="">Description:</label><br>
            <textarea name="description" id="description" cols="30" rows="10" placeholder="enter event description"></textarea><br><br>

            
        </fieldset>
        <fieldset>
            <legend>Organizer Information</legend>

            <label for="">Organizer Name:</label>
            <input type="text" name="organizerName" id="organizerName" placeholder="enter organizer name"><br><br>

            <label for="">Contact Email:</label>
            <input type="email" name="contactEmail" id="contactEmail" placeholder="enter contact email"><br><br>

            <label for="">Contact Phone:</label>
            <input type="tel" name="contactPhone" id="contactPhone" placeholder="enter contact phone"><br><br>
        </fieldset>
        <fieldset>
            <legend>Event Registration Form for Students</legend>
            <label for="">Student Name:</label>
            <input type="text" name="studentName" id="studentName" placeholder="enter student name"><br><br>
            <label for="">Student Email:</label>
            <input type="email" name="studentEmail" id="studentEmail" placeholder="enter student email"><br><br>

            <label for="">Student From:</label>
            <select name="studentFrom" id="studentFrom">
                <option value="">Select Student Type</option>
                <option value="hosteler">Hosteler</option>
                <option value="non-hosteler">Non-Hosteler</option>
            </select>
            <br>
            <br>
            <label for="">Student ID:</label>
            <input type="text" name="studentID" id="studentID" placeholder="enter student ID"><br><br>
            <label for="">Event Selection:</label>
            <select name="eventSelection" id="eventSelection">
                <option value="">Select Event</option>
                <option value="trivia night">Trivia Night</option>
                <option value="music workshop">Music Workshop</option>
                <option value="dance">Dance</option>
                <option value="techconference">Tech Conference</option>
                <option value="quiz game">Quiz Games</option>
            </select><br><br>
            <input type="submit" value="Register">
        </fieldset>
        </fieldset>
