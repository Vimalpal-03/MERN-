<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Registration Form</legend>

            <fieldset>
                <legend>Personal Information</legend>
                <label for="">First Name:</label>
                <input type="text" name="firstName" id="firstName" placeholder="enter your first name"><br><br>

                <label for="">Last Name:</label>
                <input type="text" name="lastName" id="lastName" placeholder="enter your last name"><br><br>

            </fieldset>
            <fieldset>
                <legend>Account Information</legend>
                <label for="">Email:</label>
                <input type="email" name="email" id="email" placeholder="enter your email"><br><br>

                <label for="">Password:</label>
                <input type="password" name="password" id="password" placeholder="enter your password"><br><br>
            </fieldset>
            <fieldset>
                <label for="">Contact Number:</label>
                <input type="tel" name="contactNumber" id="contactNumber" placeholder="enter your contact number"><br><br>
            </fieldset>
            <fieldset>
                <label for="address">Address:</label>
                <input type="text" name="address" id="address" placeholder="enter your address"><br><br>
                <label for="zipcode">Zip Code:</label>
                <input type="text" name="zipcode" id="zipcode" placeholder="enter your zipcode"><br><br>
            </fieldset>
            <fieldset>
                <legend>Submit</legend>
                <input type="submit" value="Register">
            </fieldset>
        </fieldset>
    </form>
</body>
</html>
